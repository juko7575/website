<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Grid</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <header class="site-header">

        <div class="header-top">
    
            <a class="site-logo" href="grid.html">
    
                <img src="assets/logo.png" alt="Logo">
    
                <span>CTB</span>
    
            </a>
    
            <div class="header-search">

                <div id="search-box">
            
                    <input
                        id="search"
                        type="text"
                        placeholder="Search weapons, vehicles, tags..."
                    >
            
                    <div id="search-tags"></div>
            
                </div>
            
                <div id="tag-menu"></div>
            
                <div id="tag-suggestions"></div>
            
            </div>
    
            <nav
            id="view-nav"
            class="header-links"
        >
        
            <a
                href="#"
                class="view-link"
                data-view="antiTank"
            >
                Anti-Tank
            </a>
        
            <a
                href="#"
                class="view-link"
                data-view="armor"
            >
                Armor
            </a>
        
            <a
                href="#"
                class="view-link"
                data-view="configs"
            >
                Configs
            </a>
        
        </nav>
    
        </div>
    
    
    </header>
    


    <div class="grid-container">

        <div id="grid"></div>
    
    </div>

    <div id="page-overlay">

        <div id="page-overlay-backdrop"></div>
    
        <div id="page-overlay-center">
    
            <div id="page-overlay-content">
    
                <main
                    id="overlay-content"
                    class="container"
                ></main>
    
            </div>
    
        </div>
    
        <button id="page-close">
            ✕
        </button>
    
        <aside id="overlay-toc"></aside>
    
    </div>
    
    <script src="base/entityRegistry.js"></script>
    <script src="base/iconRegistry.js"></script>
    <script src="base/blockTemplates.js"></script>
    <script src="data/tags.js"></script>
    <script src="data/views.js"></script>
    
    <script src="js/blocks.js"></script>
    
    <script src="js/grid.js"></script>

</body>

</html>
